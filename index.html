<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarm Stamp Machine</title>
  <style>

    @font-face {
      font-family: "Banks Miles Double Line";
      src: url("fonts/banks-miles-double-line.woff2") format("woff2"),
           url("fonts/banks-miles-double-line.woff") format("woff"),
           url("fonts/banks-miles-double-line.ttf") format("truetype");
      font-display: swap;
    }


    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #b89970;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(
          90deg,
          transparent, transparent 2px,
          rgba(139,90,43,0.04) 2px, rgba(139,90,43,0.04) 4px
        ),
        repeating-linear-gradient(
          0deg,
          transparent, transparent 8px,
          rgba(139,90,43,0.02) 8px, rgba(139,90,43,0.02) 10px
        ),
        linear-gradient(180deg, #d4b896 0%, #c4a882 50%, #b89970 100%);
      font-family: system-ui, -apple-system, sans-serif;
    }

    .machine {
      position: relative;
      width: 380px;
      background: #c41e1e;
      border: 14px solid #f0ebe0;
      border-radius: 14px;
      box-shadow:
        4px 6px 24px rgba(0,0,0,0.45),
        inset 0 0 60px rgba(0,0,0,0.15);
      padding: 32px 28px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      user-select: none;
    }

    /* ── Title text ── */

    .machine-title {
      font-family: "Banks Miles Double Line", 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #f5c518;
      text-align: center;
      text-shadow:
        1px 1px 0 #b8960e,
        2px 2px 4px rgba(0,0,0,0.3);
      line-height: 1.15;
      margin-bottom: 42px;
      letter-spacing: 0.02em;
    }

    .machine-title .line1 {
      font-size: 4.6rem;
      display: block;
    }

    .machine-title .line2 {
      font-size: 3.9rem;
      display: block;
    }

    .machine-title .line3 {
      font-size: 4rem;
      display: block;
      margin-top: 5px;
    }

    /* ── Right-side hardware column ── */

    .hardware {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      width: 84%;
      margin-top: 12px;
      margin-bottom: 30px;
    }

    .left-labels {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 15px;
    }

    .right-hardware {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }


    /* ── Embossed bee ── */

    .embossed-bee {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 16px;
      opacity: 0.35;
      pointer-events: none;
    }

    .embossed-bee svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0.5px 0 rgba(255,255,255,0.2));
    }

    /* ── Coin slot ── */

    .coin-slot-housing {
      width: 64px;
      height: 80px;
      background: linear-gradient(160deg, #d8d8d8, #999 40%, #777 80%);
      border: 2px solid #666;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 1px 2px 6px rgba(0,0,0,0.35);
      cursor: pointer;
      transition: transform 0.1s;
      position: relative;
    }

    .coin-slot-housing:hover {
      transform: scale(1.03);
    }

    .coin-slot-housing:active {
      transform: scale(0.97);
    }

    .coin-slot-housing.disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .coin-slit {
      width: 36px;
      height: 5px;
      background: #1a1a1a;
      border-radius: 2px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
    }

    /* ── Knob ── */

    .knob {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, #e8e8e8, #aaa 50%, #888);
      border: 2px solid #666;
      box-shadow: 1px 2px 6px rgba(0,0,0,0.35);
      position: relative;
      transition: transform 0.5s ease;
    }

    .knob.turned {
      transform: rotate(90deg);
    }

    .knob::after {
      content: '';
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 10px;
      background: #555;
      border-radius: 1px;
    }

    /* ── Labels ── */

    .label {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #f5c518;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }

    .label-insert {
      font-size: 1.1rem;
      line-height: 1.3;
    }

    .label-insert .amount {
      font-size: 2rem;
      display: block;
    }



    /* ── Collection tray ── */

    .tray-area {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 23px;
    }

    .tray {
      width: 70%;
      height: 8px;
      background: linear-gradient(180deg, #111, #2a2a2a);
      border-radius: 4px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.8);
      position: relative;
      overflow: visible;
    }

    .batch-info {
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      color: #f5c518;
      text-align: center;
      opacity: 0.8;
      margin-top: 2px;
      min-height: 1em;
    }

    .batch-info .expired {
      color: #ff6666;
    }

    /* ── Status overlay ── */


    /* ── Coin animation ── */

    @keyframes coin-drop {
      0%   { transform: translateY(-40px); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: translateY(0); opacity: 0; }
    }

    .coin {
      position: absolute;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #f5d442, #c9a100);
      border: 2px solid #b8960e;
      box-shadow: 1px 1px 4px rgba(0,0,0,0.4);
      pointer-events: none;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.35rem;
      font-weight: bold;
      color: #8a6d00;
      font-family: system-ui, sans-serif;
      letter-spacing: -0.02em;
    }

    .coin::after {
      content: 'BZZ';
      transform: rotate(-45deg);
    }

    .coin.dropping {
      animation: coin-drop 0.6s ease-in forwards;
    }

    /* ── Booklet animation ── */

    @keyframes booklet-dispense {
      0%   { transform: translate(-50%, 10px); opacity: 0; }
      30%  { opacity: 1; }
      70%  { transform: translate(-50%, -18px); }
      85%  { transform: translate(-50%, -12px); }
      100% { transform: translate(-50%, -14px); opacity: 1; }
    }

    .booklet {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 144px;
      height: 75px;
      background: #c41e1e;
      border: 1px solid #a01818;
      border-radius: 1px;
      box-shadow: 1px 2px 4px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 6px 10px;
      overflow: hidden;
    }

    .booklet-count {
      font-family: "Banks Miles Double Line", 'Helvetica Neue', sans-serif;
      font-size: 1.8rem;
      color: #f5c518;
      line-height: 1;
    }

    .booklet-label {
      font-family: "Banks Miles Double Line", 'Helvetica Neue', sans-serif;
      font-size: 0.8rem;
      color: #f0ebe0;
      line-height: 1;
      letter-spacing: 0.02em;
      white-space: nowrap;
      padding: 20px 0px 0 0;
    }

    .booklet-copy {
      position: absolute;
      bottom: 6px;
      right: 10px;
      width: 16px;
      height: 16px;
      color: #f0ebe0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
    }

    .booklet-copy svg {
      width: 100%;
      height: 100%;
    }

    .booklet-stamp {
      position: absolute;
      top: 6px;
      right: 7px;
      width: 32px;
      height: 32px;
      background: #e07020;
      border: 0.5px solid #d4a574;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
    }

    .booklet-stamp svg {
      width: 100%;
      height: 100%;
    }

    .booklet.dispensed {
      display: flex;
      animation: booklet-dispense 0.8s ease-out forwards;
    }

    /* ── Rejected coin animation ── */

    @keyframes coin-reject {
      0%   { transform: translateY(-10px); opacity: 0; }
      40%  { opacity: 1; transform: translateY(0); }
      100% { transform: translateY(20px); opacity: 0; }
    }

    .coin.rejected {
      animation: coin-reject 0.8s ease-in forwards;
    }

    /* ── Indicator light ── */

    .indicator-light {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #440000;
      border: 1px solid #333;
      transition: background 0.15s;
    }

    @keyframes flash-red {
      0%, 100% { background: #ff1a1a; box-shadow: 0 0 8px #ff1a1a, 0 0 16px rgba(255,26,26,0.5); }
      50% { background: #440000; box-shadow: none; }
    }

    .indicator-light.active {
      animation: flash-red 0.8s ease-in-out infinite;
    }

    .indicator-light.success {
      background: #22cc44;
      box-shadow: 0 0 8px #22cc44;
      animation: none;
    }

    /* ── Booklet clickable ── */

    .booklet.dispensed {
      cursor: pointer;
      filter: brightness(0.85);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .booklet.dispensed:hover {
      filter: brightness(1);
      transform: translate(-50%, -20px) scale(1.08);
      box-shadow: 3px 5px 12px rgba(0,0,0,0.45);
    }

    .copied-toast {
      position: absolute;
      bottom: -34px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #f5c518;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      visibility: hidden;
      transition: visibility 0.3s;
      pointer-events: none;
    }

    .copied-toast.show {
      visibility: visible;
    }

    .eject-label {
      font-family: "Banks Miles Double Line", 'Helvetica Neue', sans-serif;
      font-size: 0.6rem;
      color: #7a1a1a;
      cursor: pointer;
      letter-spacing: 0.06em;
      user-select: none;
      -webkit-user-select: none;
      display: none;
      align-items: center;
      gap: 4px;
      justify-content: center;
      padding: 3px 0 0;
    }

    .eject-label.visible {
      display: flex;
    }

    .eject-icon {
      width: 12px;
      height: 12px;
    }

    .hold-toast {
      position: absolute;
      bottom: -34px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #f5c518;
      font-family: system-ui, sans-serif;
      font-size: 0.65rem;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      visibility: hidden;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .hold-toast::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0;
      background: rgba(224, 60, 40, 0.35);
      z-index: -1;
    }

    .hold-toast.show {
      visibility: visible;
    }

    .hold-toast.filling::before {
      width: 100%;
      transition: width 5s linear;
    }

    .hold-toast.phase1::before {
      width: 0;
      transition: none;
    }

    /* ── Responsive ── */

    @media (max-width: 440px) {
      .machine {
        width: 92vw;
        padding: 24px 18px 20px;
      }
      .machine-title .line1 { font-size: 2.6rem; }
      .machine-title .line2 { font-size: 2.1rem; }
      .machine-title .line3 { font-size: 2.9rem; }
      .label-insert { font-size: 0.95rem; }
      .label-insert .amount { font-size: 1.6rem; }
    }

    @media (max-width: 340px) {
      .machine {
        width: 98vw;
        padding: 18px 12px 16px;
      }
      .machine-title .line1 { font-size: 2rem; }
      .machine-title .line2 { font-size: 1.6rem; }
      .machine-title .line3 { font-size: 2.2rem; }
      .coin-slot-housing { width: 52px; height: 66px; }
    }

    @media (min-width: 600px) {
      .machine {
        width: 420px;
      }
    }

  </style>
</head>
<body>
  <div class="machine" data-machine>

    <div class="machine-title" data-title>
      <span class="line1">Swarm</span>
      <span class="line2">Postage</span>
      <span class="line3">Stamps</span>
    </div>

    <div class="hardware">
      <div class="left-labels">
        <div class="label label-insert">
          Insert<br>
          <span class="amount" data-cost></span>
          <span data-demo-trigger style="cursor:pointer">Coin</span>
        </div>
      </div>

      <div class="right-hardware">
        <div class="indicator-light" data-light></div>
        <div class="coin-slot-housing" data-coin-slot>
          <div class="coin-slit"></div>
          <div class="embossed-bee"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1115 1115"><path d="M0 665.01V965l260 150 260-150.01V664.96L260 515 0 665.01zM855 515 595 665v299.99L855 1115l260-150.01V664.95L855 515zM817.32 300.27l-129.91-75.25-.13-149.98L557.5 0 297.68 150.01V450L557.5 600l259.82-150V300.27z" fill="#555"/><path d="m817.32 300.27 129.91-75.3V75L817.52 0 687.28 75.04l130.24 74.83-.2 150.4z" fill="#555"/></svg></div>
        </div>
        <div class="knob" data-knob></div>
      </div>
    </div>

    <div class="tray-area">
      <div class="tray" data-tray>
        <div class="booklet" data-booklet>
          <span class="booklet-count">2²⁰</span>
          <span class="booklet-label">Swarm Stamps</span>
          <span class="booklet-copy"><svg viewBox="0 0 24 24" fill="none"><rect x="8" y="8" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="2"/><path d="M16 8V5.5A1.5 1.5 0 0 0 14.5 4H5.5A1.5 1.5 0 0 0 4 5.5v9A1.5 1.5 0 0 0 5.5 16H8" stroke="currentColor" stroke-width="2"/></svg></span>
          <span class="booklet-stamp"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1115 1115"><path d="M0 665.01V965l260 150 260-150.01V664.96L260 515 0 665.01zM855 515 595 665v299.99L855 1115l260-150.01V664.95L855 515zM817.32 300.27l-129.91-75.25-.13-149.98L557.5 0 297.68 150.01V450L557.5 600l259.82-150V300.27z" fill="#f5c518"/><path d="m817.32 300.27 129.91-75.3V75L817.52 0 687.28 75.04l130.24 74.83-.2 150.4z" fill="#f5c518"/></svg></span>
        </div>
        <div class="copied-toast" data-toast>Copied to clipboard</div>
        <div class="hold-toast" data-hold-toast>Book of Stamps downloaded. Keep your stamps safe!</div>
      </div>
      <div class="eject-label" data-eject><svg class="eject-icon" viewBox="0 0 24 24" fill="none"><path d="M5 14l7-9 7 9H5z" fill="currentColor"/><rect x="5" y="17" width="14" height="3" rx="0.5" fill="currentColor"/></svg>Eject</div>
      <div class="batch-info" data-batch-info></div>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
